org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Network / Gradle download resilience (increase timeouts and retries)
org.gradle.internal.http.connectionTimeout=600000
org.gradle.internal.http.socketTimeout=600000
org.gradle.internal.http.maxRetries=5
systemProp.http.keepAlive=true

# Force Gradle to use Android Studio JBR (avoid unsupported system JDK)
org.gradle.java.home=C:\\Program Files\\Android\\Android Studio\\jbr
