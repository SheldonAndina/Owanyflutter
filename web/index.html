<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Owany - Sistema moderno de gestão de condomínios. Gerencie apartamentos, manutenções e residentes de forma simples e eficiente.">
  <meta name="keywords" content="condomínio, gestão, apartamentos, manutenção, residentes, owany">
  <meta name="author" content="Owany">
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#FF7A3D">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Owany">
  
  <!-- iOS PWA Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Owany">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon-180x180.png">
  
  <!-- iOS Splash Screens (opcional - melhora UX no iOS) -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="96x96" href="icons/favicon-96x96.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico"/>

  <title>Owany App</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- Preconnect para melhor performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <style>
    /* Loading screen enquanto Flutter carrega */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #FF7A3D 0%, #FF9A5C 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease-out;
    }
    .loading-logo {
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .loading-text {
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      margin-top: 16px;
      opacity: 0.9;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.9; }
    }
    
    /* PWA Install Banner */
    .pwa-install-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #2D1B0E;
      color: white;
      padding: 16px 20px;
      display: none;
      align-items: center;
      justify-content: space-between;
      z-index: 10000;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
    }
    .pwa-install-banner.show {
      display: flex;
    }
    .pwa-install-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
    }
    .pwa-install-btn {
      background: #FF7A3D;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    .pwa-install-close {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.7);
      font-size: 20px;
      cursor: pointer;
      margin-left: 12px;
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen" class="loading-screen">
    <img src="assets/assets/icon/logo.png" alt="Owany" class="loading-logo" onerror="this.style.display='none'">
    <div class="loading-spinner"></div>
    <div class="loading-text">Carregando...</div>
  </div>
  
  <!-- PWA Install Banner -->
  <div id="pwa-install-banner" class="pwa-install-banner">
    <span class="pwa-install-text">📱 Instale o Owany no seu dispositivo!</span>
    <div>
      <button id="pwa-install-btn" class="pwa-install-btn">Instalar</button>
      <button id="pwa-close-btn" class="pwa-install-close">×</button>
    </div>
  </div>

  <script>
    // PWA Install Prompt
    let deferredPrompt;
    const installBanner = document.getElementById('pwa-install-banner');
    const installBtn = document.getElementById('pwa-install-btn');
    const closeBtn = document.getElementById('pwa-close-btn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // Mostrar banner após 3 segundos
      setTimeout(() => {
        if (!localStorage.getItem('pwa-dismissed')) {
          installBanner.classList.add('show');
        }
      }, 3000);
    });

    installBtn?.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          console.log('PWA installed');
        }
        deferredPrompt = null;
        installBanner.classList.remove('show');
      }
    });

    closeBtn?.addEventListener('click', () => {
      installBanner.classList.remove('show');
      localStorage.setItem('pwa-dismissed', 'true');
    });

    // Esconder loading quando Flutter carregar
    window.addEventListener('flutter-first-frame', function() {
      const loadingScreen = document.getElementById('loading-screen');
      if (loadingScreen) {
        loadingScreen.classList.add('hidden');
        setTimeout(() => loadingScreen.remove(), 300);
      }
    });
  </script>
  
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
