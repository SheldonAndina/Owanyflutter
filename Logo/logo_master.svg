<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Radial background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="52%">
      <stop offset="0%" stop-color="#FF7A2F"/>
      <stop offset="60%" stop-color="#E85D1A"/>
      <stop offset="100%" stop-color="#B83A00"/>
    </radialGradient>

    <!-- Inner glow on circle -->
    <radialGradient id="innerGlow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFAB70" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF7A2F" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000000" flood-opacity="0.55"/>
    </filter>

    <!-- Glow filter for icon -->
    <filter id="iconShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFBE80" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#FF8C3A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#9B3200" stop-opacity="0.5"/>
    </linearGradient>

    <clipPath id="circleClip">
      <circle cx="512" cy="512" r="450"/>
    </clipPath>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="512" cy="512" r="480" fill="none" stroke="#E85D1A" stroke-width="3" opacity="0.3"/>
  <circle cx="512" cy="512" r="468" fill="none" stroke="#FF9A50" stroke-width="1.5" opacity="0.2"/>

  <!-- Main circle with shadow -->
  <circle cx="512" cy="512" r="450" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Inner highlight -->
  <circle cx="512" cy="512" r="450" fill="url(#innerGlow)" clip-path="url(#circleClip)"/>

  <!-- Subtle texture overlay circles -->
  <circle cx="512" cy="512" r="450" fill="none" stroke="url(#ringGrad)" stroke-width="8"/>

  <!-- ============================================================
       BUILDING ICON — centered, professional proportions
       ============================================================ -->
  <g filter="url(#iconShadow)" transform="translate(512,520)">

    <!-- 
      Icon design: modern city skyline / apartment block
      Dark charcoal on orange — clean, geometric, mature
    -->
    <g fill="#1C1410" opacity="0.92">

      <!-- Left tower (tallest) -->
      <rect x="-195" y="-195" width="110" height="265" rx="6"/>
      <!-- Left tower windows grid -->
      <rect x="-181" y="-178" width="24" height="20" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="-149" y="-178" width="24" height="20" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="-181" y="-146" width="24" height="20" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="-149" y="-146" width="24" height="20" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="-181" y="-114" width="24" height="20" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="-149" y="-114" width="24" height="20" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="-181" y="-82" width="24" height="20" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="-149" y="-82" width="24" height="20" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="-181" y="-50" width="24" height="20" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="-149" y="-50" width="24" height="20" rx="3" fill="#FF9A50" opacity="0.35"/>

      <!-- Center tower (medium height) -->
      <rect x="-72" y="-145" width="144" height="215" rx="6"/>
      <!-- Center windows -->
      <rect x="-56" y="-128" width="28" height="22" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="-18" y="-128" width="28" height="22" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="20" y="-128" width="28" height="22" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="-56" y="-94" width="28" height="22" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="-18" y="-94" width="28" height="22" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="20" y="-94" width="28" height="22" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="-56" y="-60" width="28" height="22" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="-18" y="-60" width="28" height="22" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="20" y="-60" width="28" height="22" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="-56" y="-26" width="28" height="22" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="-18" y="-26" width="28" height="22" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="20" y="-26" width="28" height="22" rx="3" fill="#FF9A50" opacity="0.35"/>

      <!-- Right tower (medium-short) -->
      <rect x="85" y="-165" width="110" height="235" rx="6"/>
      <!-- Right tower windows -->
      <rect x="99" y="-148" width="24" height="20" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="131" y="-148" width="24" height="20" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="99" y="-116" width="24" height="20" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="131" y="-116" width="24" height="20" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="99" y="-84" width="24" height="20" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="131" y="-84" width="24" height="20" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="99" y="-52" width="24" height="20" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="131" y="-52" width="24" height="20" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="99" y="-20" width="24" height="20" rx="3" fill="#FF9A50" opacity="0.35"/>
      <rect x="131" y="-20" width="24" height="20" rx="3" fill="#FF9A50" opacity="0.35"/>

      <!-- Ground base bar -->
      <rect x="-215" y="70" width="430" height="16" rx="4"/>

    </g>
  </g>

</svg>
