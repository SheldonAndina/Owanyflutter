name: owany_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # Ícones Cupertino
  cupertino_icons: ^1.0.8

  # HTTP para consumir APIs
  http: ^1.1.0
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6

  # Persistência local (Windows, Web, Mobile)
  shared_preferences: ^2.1.1
  # Secure storage for sensitive data (tokens)
  flutter_secure_storage: ^10.0.0

  # JWT decode opcional
  jwt_decode: ^0.3.1

  # Gerenciamento de estado
  provider: ^6.0.5
  shimmer: ^3.0.0
  
  # Intl para formatação
  intl: ^0.20.2
  
  # Connectivity para detecção de rede
  connectivity_plus: ^7.0.0
  fl_chart: ^1.1.1
  pdf: ^3.10.7
  printing: ^5.12.0
  excel: ^4.0.6
  path_provider: ^2.1.2
  path: ^1.9.0  # Para path.join() no Windows
  share_plus: ^12.0.1
  qr_flutter: ^4.1.0  # QR Code generation
  mobile_scanner: ^7.2.0
  flutter_svg: ^2.0.0
  uuid: ^4.5.3
  file_picker: ^10.3.10  # Para escolher local de salvamento
  signalr_netcore: ^1.3.7  # SignalR real-time notifications
  app_links: ^7.0.0
  flutter_local_notifications: ^21.0.0
  url_launcher: ^6.2.0  # Open URLs in browser/external apps
  mask_text_input_formatter: ^2.7.0
  archive: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # 🔥 GERADOR DE ÍCONE DO APP
  flutter_launcher_icons: ^0.14.4

  # 🌍 I18N GENERATOR
  intl_utils: ^2.8.0

# dependency_overrides:
#  file_picker_windows: ^2.0.0

## Removed win32 override to allow resolver to pick SDK-compatible versions
# dependency_overrides:
#  win32: ^6.0.0

# ⚙️ CONFIGURAÇÃO DO ÍCONE
flutter_launcher_icons:
  image_path: "assets/icon/app_icon_padded.png"
  android: true
  ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/app_icon_padded.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icon/app_icon_padded.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    image_path: "assets/icon/app_icon_padded.png"
  macos:
    generate: true
    image_path: "assets/icon/app_icon_padded.png"
  linux:
    generate: true
    image_path: "assets/icon/app_icon_padded.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icon/app_icon.png
    - assets/icon/app_icon_padded.png

